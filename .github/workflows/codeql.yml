#
# Runs GitHub CodeQL static analysis to detect security vulnerabilities,
# code quality issues, and potential bugs in the Swift codebase.
# ============================================================================

name: "CodeQL Security Analysis"

# Run on pushes to protected branches and on PRs targeting them.
# Also run weekly to catch newly discovered vulnerability patterns.
on:
  push:
    branches: [main, beta, alpha]
  pull_request:
    branches: [main, beta, alpha]
  schedule:
    # Run every Monday at 06:00 UTC for ongoing security monitoring
    - cron: '0 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent duplicate runs on the same PR
concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  # Required for CodeQL to upload results
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Swift
    # macOS 15 runner already has Swift 6.3 preinstalled — no setup-swift needed
    runs-on: macos-15
    # Bumped from 45 → 75 after the post-#382 codebase growth started
    # producing intermittent timeouts. The build-for-analysis step takes
    # ~25 min on a cold runner; the analysis step adds another ~15 min
    # on its own. 45 min was leaving roughly 5 min of margin before SPM
    # cache restores, which fell off the cliff once the integration
    # batch added ~3700 lines. See #382, #403, #405, #407 for the run
    # IDs that hit the previous cap.
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        language: ['swift']

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Verify Swift version (already installed on runner)
      - name: Verify Swift version
        run: swift --version

      # Step 3: Initialize CodeQL for the specified language
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Use extended security queries for comprehensive analysis
          queries: security-extended

      # Step 4: Build the project (CodeQL needs to observe the build)
      - name: Build for CodeQL analysis
        run: swift build

      # Step 5: Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
