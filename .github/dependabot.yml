# Copyright © 2026 MWBM Partners Ltd. All rights reserved.
#
# Per SECURITY.md F-010 (T7 — supply-chain). Closes one half of the
# residual recommendation: a CI-mediated upgrade flow that surfaces
# every action / SPM version bump as a reviewable PR rather than
# letting major-tag re-pointers (the `@v4` re-tag risk) slide
# silently into a build.
#
# Two ecosystems active:
#
# * github-actions — weekly scan of `.github/workflows/*.yml` for
#   newer releases of each `uses:` reference. Dependabot opens a
#   PR per bump; the existing `dependency-review-action` workflow
#   already gates new transitive dependencies.
#
# * swift — weekly scan of Package.swift's SPM dependencies. Lifts
#   the three active deps (Sparkle, ffmpeg-kit, swift-argument-parser)
#   AND the gated MeedyaSuite-core branch pin (which will become
#   a tag pin per F-009/G-014 once the sibling repo cuts a tagged
#   release).
#
# No `target-branch` is set, so Dependabot targets the repository's
# DEFAULT branch (`main`). Dependabot reads this config only from the
# default branch and opens its PRs against `target-branch` if set, or
# the default branch otherwise — and that branch MUST exist on the
# remote. An earlier revision pinned `target-branch: autopilot/2026-06-30`
# (the transient run branch), which does not exist on origin; on merge
# to main Dependabot would have found no such base branch and opened
# ZERO update PRs, silently defeating this file's whole purpose. Omit
# the key so it always tracks whatever the live default branch is.
# ============================================================================

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "swift"
