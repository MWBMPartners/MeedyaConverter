# ---------------------------------------------------------------------------
# Notes for App Review
# ---------------------------------------------------------------------------
notes: |
  MeedyaConverter is a media transcoder. To test:
    1. Drag any video or audio file into the main window
    2. Select an output profile (e.g. "HEVC 1080p")
    3. Click "Start" — encoding begins immediately, no account required

  The App Store build uses FFmpegKit (LGPL, Apache-compatible) linked as
  a framework. No subprocess calls to external binaries. All file access
  goes through NSOpenPanel + security-scoped bookmarks.

  The app is not a downloader. It does not scrape, rip, or circumvent DRM
  on content from streaming services. Optical disc ripping is limited to
  unencrypted audio CDs for the App Store build — CSS/AACS-encrypted DVD
  and Blu-ray support is only in the direct-distribution build.
